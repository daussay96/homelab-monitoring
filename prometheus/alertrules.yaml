apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules          # Referenced in prometheus deployment as a volume
  namespace: monitoring
data:
  alert.rules.yml: |
    groups:
      - name: node.rules           # Group name — like an alert category in ServiceNow
        rules:

          # Fires if a node-exporter instance disappears — equivalent to "host unreachable"
          - alert: NodeDown
            expr: up{job="node-exporter"} == 0
            for: 1m                # Must be down for 1 minute before alerting
            labels:
              severity: critical
            annotations:
              summary: "Node Exporter down on {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} has been unreachable for over 1 minute"

          # Fires if CPU stays above 80% — mirrors a typical SLA threshold
          - alert: HighCPUUsage
            expr: (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) by (instance)) * 100 > 80
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.instance }}"
              description: "CPU usage is {{ $value | printf \"%.1f\" }}% — above 80% threshold"

          # Fires if RAM usage exceeds 85%
          - alert: HighMemoryUsage
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High memory on {{ $labels.instance }}"
              description: "Memory usage is {{ $value | printf \"%.1f\" }}% — above 85% threshold"

          # Fires if any filesystem exceeds 85% usage
          - alert: HighDiskUsage
            expr: (1 - node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High disk usage on {{ $labels.instance }}"
              description: "Filesystem {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full"
