apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: node-exporter        # Only scrape node-exporter pods

          # FIX: Use the pod's host IP directly instead of __address__
          # __address__ already had :9100 appended by hostNetwork, causing double port
          # __meta_kubernetes_pod_host_ip gives us just the raw IP e.g. 172.21.0.3
          - source_labels: [__meta_kubernetes_pod_host_ip]
            action: replace
            target_label: __address__
            replacement: $1:9100        # Now safely appends :9100 once
