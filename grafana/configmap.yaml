apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090    # 'prometheus' resolves because both pods
                                       # are in the same namespace — like internal
                                       # DNS on a corporate network
        isDefault: true                # Makes this the default data source
        access: proxy                  # Grafana queries Prometheus server-side
