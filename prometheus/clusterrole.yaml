apiVersion: v1
kind: ServiceAccount        # An identity for the Prometheus pod to run as
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole           # Defines what permissions this role has cluster-wide
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:              # The list of things Prometheus is allowed to read
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]   # Read-only — no write access needed
  - apiGroups: ["extensions"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding    # Binds the ClusterRole above to the ServiceAccount
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus          # Must match the ClusterRole name above
subjects:
  - kind: ServiceAccount
    name: prometheus        # Must match the ServiceAccount name above
    namespace: monitoring
